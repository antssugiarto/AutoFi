        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(24px);
        }

<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- TopNavBar (Shell Suppression: Not rendered for transactional focused screen) -->
<main class="min-h-screen flex items-center justify-center relative p-6">
<!-- Ambient Glow Background Blobs -->
<div class="absolute top-1/4 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-24 w-96 h-96 bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-tertiary/5 rounded-full blur-[160px] pointer-events-none"></div>
<section class="max-w-xl w-full text-center relative z-10">
<!-- Visual Representative of Automation -->
<div class="mb-12 flex justify-center">
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Layered Glow Rings -->
<div class="absolute inset-0 rounded-full border border-primary/20 scale-100 opacity-60"></div>
<div class="absolute inset-4 rounded-full border border-secondary/20 scale-100 opacity-40"></div>
<div class="absolute inset-8 rounded-full border border-tertiary/20 scale-100 opacity-20"></div>
<!-- Core Automation Visual -->
<div class="relative z-10 bg-surface-container-highest/80 glass-panel p-8 rounded-full shadow-[0_0_64px_rgba(163,166,255,0.1)]">
<img alt="Automation Core" class="w-24 h-24" data-alt="a glowing iridescent geometric orb floating in a dark vacuum, pulsing with soft purple and blue light, high-tech digital aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9Y4EqT99B4GnnKFxISA35JBhaUFmurRHz4S72einLo7w91oArPWjGtLp7wcpjdqbKWKNfIz6QYZakzW7Le5YNi0k0dJmhwfOOp02FORB8dIBEKx8wf5cDrXGh6upQiceWBrMecq6UR87DKWIFlCbOFgsKeduPrPgDDO3vE_xaccuDD--pDm15fAl0TPv2NZOIfWBZcyIdp7g6ggED3qfC7HLV3LTthHUQxbbKSSTtjGWAZ302YfJofjj6F9mCP1ksGoc1OtGgcjo"/>
</div>
<!-- Floating Data Points (Visual interest) -->
<div class="absolute top-0 right-0 p-3 bg-surface-container-high rounded-xl text-primary text-xs font-bold shadow-sm">
                        STRATEGY_ALPHA
                    </div>
<div class="absolute bottom-4 left-0 p-3 bg-surface-container-high rounded-xl text-tertiary text-xs font-bold shadow-sm">
                        OPTIMIZING_YIELD
                    </div>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tighter text-on-surface">
                    Executing your strategy...
                </h1>
<p class="text-on-surface-variant text-lg max-w-md mx-auto leading-relaxed">
                    Please wait while our AI handles the complexity for you.
                </p>
</div>
<!-- Progress Indication (Modern non-line approach) -->
<div class="mt-16 flex flex-col items-center gap-6">
<div class="flex gap-3">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-primary/60 animate-pulse" style="animation-delay: 200ms"></div>
<div class="w-2 h-2 rounded-full bg-primary/30 animate-pulse" style="animation-delay: 400ms"></div>
</div>
<!-- Status Tags -->
<div class="flex flex-wrap justify-center gap-4">
<div class="bg-surface-container-low px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" data-icon="hub">hub</span>
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Analyzing Nodes</span>
</div>
<div class="bg-surface-container-low px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-tertiary" data-icon="lock">lock</span>
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Securing Assets</span>
</div>
</div>
</div>
<!-- Transaction Details Card (Glassmorphism) -->
<div class="mt-12 p-1 bg-gradient-to-br from-primary/20 to-transparent rounded-xl">
<div class="bg-surface-container-low/90 glass-panel rounded-xl p-6 flex flex-col md:flex-row justify-between items-center gap-6">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="wallet">wallet</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-label uppercase tracking-wider">Target Wallet</p>
<p class="text-sm font-bold font-headline">0x71C...8e21</p>
</div>
</div>
<div class="h-8 w-[1px] bg-outline-variant/20 hidden md:block"></div>
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="bolt">bolt</span>
</div>
<div>
<p class="text-xs text-on-surface-variant font-label uppercase tracking-wider">Estimated Gas</p>
<p class="text-sm font-bold font-headline">0.0024 ETH</p>
</div>
</div>
<button class="w-full md:w-auto px-6 py-3 bg-surface-container-highest text-on-surface text-sm font-bold rounded-full hover:bg-surface-bright transition-all duration-300">
                        Cancel Task
                    </button>
</div>
</div>
</section>
</main>
<!-- Footer Component (Execution Suppression: Typically hidden on focused execution screens, but showing minimalist version for identity) -->
<footer class="fixed bottom-0 w-full py-8 px-4 flex flex-col items-center gap-4">
<div class="h-[1px] w-12 bg-outline-variant/30 mb-2"></div>
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant opacity-50">
            © 2024 AutoFi. The Intelligent Atmosphere.
        </p>
</footer>
