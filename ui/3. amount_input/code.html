<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #070d1f;
      color: #dfe4fe;
      font-family: 'Inter', sans-serif;
    }
    .glass-card {
      backdrop-filter: blur(24px);
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>

<body class="min-h-screen flex flex-col items-center overflow-hidden">
<!-- TopNavBar Suppressed for Transactional Focus Journey -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-20 max-w-[1440px] mx-auto bg-surface/80 backdrop-blur-xl dark:bg-[#070d1f]/80">
<div class="text-2xl font-bold tracking-tighter text-[#a3a6ff] font-manrope">AutoFi</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant hover:text-white transition-all duration-300">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</nav>
<!-- Ambient Glow Background Blobs -->
<div class="fixed top-1/4 -left-20 w-96 h-96 bg-secondary opacity-5 blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 w-[500px] h-[500px] bg-primary opacity-10 blur-[160px] pointer-events-none"></div>
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-2xl px-6 relative z-10 pt-20">
<!-- Editorial Header Section -->
<header class="text-center mb-12">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter mb-4">Enter Amount</h1>
<p class="font-body text-on-surface-variant text-lg max-w-md mx-auto">
        Specify the assets you wish to deploy into your automated vault.
      </p>
</header>
<!-- Main Input Canvas -->
<div class="w-full bg-surface-container-low rounded-[2rem] p-8 shadow-[0_0_64px_rgba(99,102,241,0.06)] relative overflow-hidden">
<!-- Token Selection Cluster -->
<div class="flex flex-col gap-4 mb-10">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-bold">Select Token</label>
<div class="grid grid-cols-2 gap-4">
<!-- SOL Token Option -->
<button class="group flex items-center gap-4 p-5 rounded-xl bg-surface-container-highest border border-outline-variant/10 hover:bg-surface-bright transition-all duration-300 text-left active:scale-95">
<div class="w-10 h-10 rounded-full bg-black flex items-center justify-center overflow-hidden">
<img alt="Solana Logo" class="w-6 h-6" data-alt="minimalist geometric solana logo symbol with vibrant purple and green gradients on a black background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKE3TxoHVePvO83dTV78XZzHQoDlcm5TBai0K9HEgEBSm086ZoXFNQbWcRh5knaRJLqHFhejk4iqVssBZxEE3z3IGrmfb-CwXowcKgpY2LrEbMkYe0P728TkxPOc2OLMmKCsoJB2u6ZC3XW702ci_nPXOMrxtK4019pXj3MgOAv5C4wMqpZqHQhPEYehLIp8jUJAO1IZuYmsyv6lIZ9NDQfLGLdn9KHcuNwQyTUxm-UMsI-ae1K9mWWBNwFJZxEDbou1v4GXoHyDQ"/>
</div>
<div>
<div class="font-headline font-bold text-white">SOL</div>
<div class="font-label text-xs text-on-surface-variant">Solana Native</div>
</div>
</button>
<!-- USDC Token Option -->
<button class="group flex items-center gap-4 p-5 rounded-xl bg-surface-variant ring-2 ring-primary/40 border border-primary/20 transition-all duration-300 text-left active:scale-95">
<div class="w-10 h-10 rounded-full bg-[#2775ca] flex items-center justify-center overflow-hidden">
<img alt="USDC Logo" class="w-6 h-6" data-alt="stylized dollar sign icon representing USDC stablecoin with high-tech blue circular accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCs9-S7R-zd9K-paU3jJPRVAcBm9kwrSt8urpuW441h3aMbuNa_FD7DKNCkeKhIihnd5_U5X8ASqa5VnaN7pTXwm65IM8uh6Ev_-2vp94doEWzCWGUFeT0Hjov17IFD_y1V8JWqkFVojeCTvpERWXSO8tQUcTJx5aoRGzExfnaXZa-cMiHLSg8kotCuFG-pc6jX8W1HA9nVyzFPnS4eWLOxYZATfiFjq8dzV3Jv7m8Adm-Pva2-C2MbwP3RWabfUKXyT7Qf4lXnETM"/>
</div>
<div class="flex-grow">
<div class="font-headline font-bold text-white">USDC</div>
<div class="font-label text-xs text-on-surface-variant">USD Coin</div>
</div>
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</div>
<!-- Large Numeric Input Field -->
<div class="relative flex flex-col items-center py-6">
<div class="absolute top-0 right-0 py-1 px-3 bg-surface-container-highest rounded-full text-[10px] font-bold text-primary-dim uppercase tracking-widest">Max: 1,240.50</div>
<input class="w-full bg-transparent border-none text-center font-headline text-8xl font-black tracking-tighter text-white focus:ring-0 placeholder:text-surface-variant placeholder:opacity-50" placeholder="0.00" type="number"/>
<div class="mt-4 font-body text-on-surface-variant text-sm flex items-center gap-2">
<span>≈ $0.00 USD</span>
</div>
</div>
<!-- Quick Amount Ratios -->
<div class="flex justify-center gap-3 mt-4">
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs hover:bg-surface-bright transition-colors active:scale-90">25%</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs hover:bg-surface-bright transition-colors active:scale-90">50%</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs hover:bg-surface-bright transition-colors active:scale-90">75%</button>
<button class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label text-xs hover:bg-surface-bright transition-colors active:scale-90">MAX</button>
</div>
</div>
<!-- Primary Action CTA -->
<div class="w-full mt-12 flex flex-col items-center gap-6">
<button class="w-full h-16 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-body font-bold text-lg hover:shadow-[0_0_32px_rgba(163,166,255,0.3)] transition-all duration-300 active:scale-95 flex items-center justify-center gap-2">
        Review Strategy
        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="font-label text-xs text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
        Automated execution secured by AutoFi Engine
      </p>
</div>
</main>
<footer class="w-full py-12 flex flex-col items-center gap-6 px-4 mt-auto">
<div class="bg-surface-container-low h-[1px] w-full max-w-[1440px]"></div>
<div class="flex flex-col md:flex-row justify-between items-center w-full max-w-[1440px] px-8 gap-6">
<div class="font-inter text-xs uppercase tracking-widest text-on-surface-variant opacity-80">
        © 2024 AutoFi. The Intelligent Atmosphere.
      </div>
<div class="flex gap-8">
<a class="font-inter text-xs uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors" href="#">Security</a>
<a class="font-inter text-xs uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors" href="#">Docs</a>
<a class="font-inter text-xs uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors" href="#">Privacy</a>
<a class="font-inter text-xs uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors" href="#">Terms</a>
</div>
</div>
</footer>
